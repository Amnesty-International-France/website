name: Continuous Integration
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  php-checks:
    name: PHP Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Validate Composer configuration
        run: composer validate
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run PHP tests
        run: composer run test
      - name: Run PHP-CS-Fixer
        run: composer run cs
      - name: Run PHPStan
        run: composer run analyse -- --no-progress --error-format=raw

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Enable Corepack
        run: corepack enable
      - name: Get Yarn cache directory
        id: yarn-cache-dir
        working-directory: private
        run: echo "dir=$(yarn config get cacheFolder)" >> "$GITHUB_OUTPUT"
      - name: Cache Yarn
        uses: actions/cache@v6
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('private/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install frontend dependencies
        working-directory: private
        run: yarn install --immutable
      - name: Build frontend assets
        working-directory: private
        run: yarn build
      - name: Run frontend unit tests
        working-directory: private
        run: yarn test
      - name: Typecheck Turnstile
        working-directory: private
        run: yarn typecheck:turnstile
      - name: Install Playwright browser
        working-directory: private
        run: yarn playwright install --with-deps chromium
      - name: Start WordPress E2E environment
        id: e2e-start
        working-directory: private
        run: yarn env:e2e:start
      - name: Seed WordPress E2E content
        working-directory: private
        run: ./tests/e2e/support/seed-wordpress.sh
      - name: Run Lighthouse audits
        continue-on-error: true
        working-directory: private
        run: |
          mkdir -p .lighthouseci
          CHROME_PATH="$(node -e "process.stdout.write(require('playwright').chromium.executablePath())")"
          export CHROME_PATH
          set +e
          yarn test:lighthouse > .lighthouseci/lhci-output.log 2>&1
          status="$?"
          set -e
          cat .lighthouseci/lhci-output.log
          exit "$status"
      - name: Summarize Lighthouse reports
        continue-on-error: true
        if: ${{ always() }}
        working-directory: private
        run: node bin/summarize-lighthouse.mjs
      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v7
        continue-on-error: true
        if: ${{ always() }}
        with:
          name: lighthouse-reports
          path: private/.lighthouseci/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
      - name: Run deterministic Playwright tests
        working-directory: private
        run: yarn test:e2e --grep-invert @cloudflare-smoke
      - name: Stop WordPress E2E environment
        if: always() && steps.e2e-start.outcome == 'success'
        working-directory: private
        run: yarn env:e2e:stop
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: private/playwright-report/
          retention-days: 14

  github-actions:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ActionLint
        uses: docker://rhysd/actionlint:latest
