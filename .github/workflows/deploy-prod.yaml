name: Deploy

on:
  push:
    branches: ['prod']

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: PROD
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/prod.key
          chmod 600 ~/.ssh/prod.key
          cat >>~/.ssh/config <<END
          Host prod
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/prod.key
            StrictHostKeyChecking no
          END
        env:
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      - name: Deploy
        run: ssh prod '$HOME/deploy.sh'
      - name: Set Sentry release
        run: |
          ssh prod 'source $HOME/initenv.sh && \
          grep -q "^SENTRY_RELEASE=" "$DOCUMENT_ROOT/.env" \
          && sed -i "s/^SENTRY_RELEASE=.*/SENTRY_RELEASE=${{ github.sha }}/" "$DOCUMENT_ROOT/.env" \
          || echo "SENTRY_RELEASE=${{ github.sha }}" >> "$DOCUMENT_ROOT/.env"'
      - name: Update schema
        run: ssh prod 'source $HOME/initenv.sh && cd "$DOCUMENT_ROOT" && wp update-db-schema'
      - name: Purge Cache Cloudflare
        run: ssh prod 'source $HOME/initenv.sh && cd "$DOCUMENT_ROOT" && wp-cli cloudflare cache_purge'
